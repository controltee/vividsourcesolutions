<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Tee | Jesse Wainaina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/hero-motion.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <img src="assets/logo.png" alt="Control Tee Logo" class="hero-logo">
            <h1>CONTROL TEE</h1>
            <p>Marketing Campaigns • Brand Identity • Motion Design</p>
            <a href="#work" class="btn">View Portfolio</a>
        </div>
    </header>

    <main id="work">
        <div class="container">
            <h2 class="section-title">Selected Projects</h2>
            <div class="portfolio-grid">
                
                <div class="project-card">
                    <div class="media-container">
                        <img src="assets/brand-identity-cover.jpg" alt="Brand Identity">
                        <div class="behance-overlay">
                            <span>View Project</span>
                        </div>
                    </div>
                    <div class="project-details">
                        <h3>Brand Identity & Logo Design</h3>
                        <p>Visual Systems • Strategy</p>
                    </div>
                </div>

                <div class="project-card">
                    <div class="media-container">
                        <video muted loop onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;">
                            <source src="assets/motion-preview.mp4" type="video/mp4">
                        </video>
                        <div class="behance-overlay">
                            <span>Watch Motion</span>
                        </div>
                    </div>
                    <div class="project-details">
                        <h3>Motion Animations</h3>
                        <p>Kinetic Typography • Video Editing</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Control Tee </p>
    </footer>

</body>
</html>
